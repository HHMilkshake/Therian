<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Therian Hub</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg, #0b1a10, #0d2b1a, #06130b, #123524);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* glow particles */
.glow {
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(144, 255, 180, 0.7);
  border-radius: 50%;
  box-shadow: 0 0 15px rgba(144,255,180,0.8);
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0); opacity: 0.3;}
  50% {transform: translateY(-100px); opacity: 1;}
  100% {transform: translateY(0); opacity: 0.3;}
}

/* center box */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.logo {
  font-size: 60px;
  animation: pulse 2s infinite;
  text-shadow: 0 0 20px #66ff99;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

.subtitle {
  opacity: 0.8;
  margin-top: -10px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 20px;
  background: #2cff88;
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px #2cff88;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
}

.enter {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #050a07;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>
</head>

<body>

<!-- glow dots -->
<script>
for(let i=0;i<25;i++){
  let d=document.createElement("div");
  d.className="glow";
  d.style.left=Math.random()*100+"vw";
  d.style.top=Math.random()*100+"vh";
  d.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(d);
}
</script>

<div class="container">
  <div class="logo">🐺 THERIAN HUB</div>
  <div class="subtitle">Enter your pack...</div>
  <button onclick="enterSite()">ENTER</button>
</div>

<div class="enter" id="enterPage">
  <h1>Welcome to the pack</h1>
  <p>Loading world...</p>
</div>

<script>
function enterSite(){
  document.getElementById("enterPage").style.display = "flex";
  setTimeout(()=>{
    alert("Her kan du no koble på profilsida di / community sida etterpå 🔥");
  }, 1200);
}
</script>

</body>
</html>
